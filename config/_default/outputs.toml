_merge = "shadow"

# FixIt 主题会内置 archives / offline / search / markdown 输出格式定义；这里只补齐页面类型映射。
home = ["html", "rss", "archives", "offline", "search"]
page = ["html", "markdown"]
section = ["html", "rss"]
taxonomy = ["html"]
term = ["html", "rss"]
