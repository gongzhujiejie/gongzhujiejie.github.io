{{- /*
  Pagefind 全局搜索弹窗注入：
  - 提供一个触发按钮 xb-pagefind-trigger，由 JS 挂载到 header
  - 提供一个全屏 modal 容器，点击触发按钮时懒加载 Pagefind UI
  - 脚本通过 Hugo Pipes 进行 minify + fingerprint
*/ -}}
{{- $pagefindModal := resources.Get "js/pagefind-modal.js" | minify | fingerprint -}}

<button id="xb-pagefind-trigger" class="xb-pagefind-trigger" type="button" aria-label="全站搜索">
  <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
</button>
<div id="xb-pagefind-modal" class="xb-pagefind-modal" role="dialog" aria-modal="true" aria-hidden="true">
  <div class="xb-pagefind-modal__backdrop" data-xb-pagefind-close="true"></div>
  <div class="xb-pagefind-panel">
    <button class="xb-pagefind-close" type="button" aria-label="关闭" data-xb-pagefind-close="true">
      <i class="fa-solid fa-xmark" aria-hidden="true"></i>
    </button>
    <div id="xb-pagefind-modal-search"></div>
  </div>
</div>
<script defer src="{{ $pagefindModal.RelPermalink }}" integrity="{{ $pagefindModal.Data.Integrity }}"></script>
